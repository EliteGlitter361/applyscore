<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>管理员登录 - 学分申请系统</title>
  <style>
    :root {
      --bg: #f0f2f5; --card-bg: #ffffff; --primary: #4f6ef7;
      --text: #1a1a2e; --border: #e5e7eb; --shadow-lg: 0 10px 25px rgba(0,0,0,0.08);
      --radius: 16px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
           background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .login-card { background:var(--card-bg); padding:40px; border-radius:var(--radius); box-shadow:var(--shadow-lg);
                  width:100%; max-width:400px; }
    h2 { text-align:center; margin-bottom:24px; }
    .form-group { margin-bottom:18px; }
    label { display:block; font-weight:600; margin-bottom:5px; }
    input { width:100%; padding:11px 14px; border:2px solid var(--border); border-radius:10px; font-size:0.95rem; }
    input:focus { border-color:var(--primary); outline:none; }
    .btn { width:100%; padding:13px; background:var(--primary); color:#fff; border:none; border-radius:28px;
           font-weight:700; cursor:pointer; font-size:1rem; margin-top:8px; }
    .btn:hover { background:#3b54d4; }
    .error { background:#fef2f2; color:#991b1b; padding:12px; border-radius:8px; margin-bottom:16px; display:none; }
    .back-link { text-align:center; margin-top:16px; }
    .back-link a { color:var(--primary); text-decoration:none; font-weight:600; }
    .create-system { text-align:center; margin-top:12px; display:none; }
    .create-system a { color:var(--primary); font-weight:700; text-decoration:underline; }

    /* 统一返回按钮样式（替代原有 .back-link） */
    .btn-back { background:none; border:none; font-size:18px; font-weight:500; color:#2a6df4; cursor:pointer; padding:6px 12px 6px 4px; border-radius:40px; display:inline-flex; align-items:center; gap:6px; transition:background 0.2s; text-decoration:none; }
    .btn-back:hover { background:rgba(42,109,244,0.08); }
    .back-row { text-align:center; margin-top:16px; }

    @media (max-width: 480px) {
      .login-card { padding:24px 18px; border-radius:12px; }
      h2 { font-size:20px; }
      input { padding:10px 12px; font-size:0.9rem; }
      .btn { padding:12px; font-size:0.95rem; }
      .btn-back { font-size:16px; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h2>🔐 管理员登录</h2>
    <div class="error" id="errorBox"></div>
    <form id="loginForm">
      <div class="form-group"><label>用户名</label><input type="text" id="username" required></div>
      <div class="form-group"><label>密码</label><input type="password" id="password" required></div>
      <button type="submit" class="btn">登录</button>
    </form>
    <div class="create-system" id="createSystemBox">
      <p>系统尚未初始化</p>
      <a href="/create-system.html">创建 system 账户</a>
    </div>
    <div class="back-row">
      <a href="/" class="btn-back">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M15 6l-6 6 6 6"/></svg>返回首页
      </a>
    </div>
  </div>

  <script>
    (async () => {
      try {
        const res = await fetch('/api/admin/check-system');
        const data = await res.json();
        if (!data.exists) {
          document.getElementById('createSystemBox').style.display = 'block';
        }
      } catch (e) { /* 忽略 */ }
    })();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorBox = document.getElementById('errorBox');
      errorBox.style.display = 'none';
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        errorBox.textContent = '用户名和密码不能为空';
        errorBox.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) {
          errorBox.textContent = data.error || '登录失败';
          errorBox.style.display = 'block';
          return;
        }
        localStorage.setItem('adminToken', data.token);
        localStorage.setItem('adminUser', JSON.stringify(data.user));
        if (data.user.role === 'system') {
          window.location.href = '/admin.html';
        } else {
          window.location.href = '/dashboard.html';
        }
      } catch (err) {
        errorBox.textContent = '网络错误，请重试';
        errorBox.style.display = 'block';
      }
    });
  </script>
</body>
</html>
