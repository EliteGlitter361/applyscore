<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>创建 System 账户 - 学分申请系统</title>
  <style>
    :root {
      --bg: #f0f2f5; --card-bg: #ffffff; --primary: #4f6ef7;
      --text: #1a1a2e; --border: #e5e7eb; --shadow-lg: 0 10px 25px rgba(0,0,0,0.08);
      --radius: 16px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
           background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .container { background:var(--card-bg); padding:40px; border-radius:var(--radius); box-shadow:var(--shadow-lg);
                 width:100%; max-width:400px; text-align:center; }
    h2 { margin-bottom:24px; }
    .form-group { text-align:left; margin-bottom:18px; }
    label { display:block; font-weight:600; margin-bottom:5px; }
    input { width:100%; padding:11px 14px; border:2px solid var(--border); border-radius:10px; font-size:0.95rem; }
    input:focus { border-color:var(--primary); outline:none; }
    .btn { width:100%; padding:13px; background:var(--primary); color:#fff; border:none; border-radius:28px;
           font-weight:700; cursor:pointer; font-size:1rem; margin-top:8px; }
    .btn:hover { background:#3b54d4; }
    .alert { padding:12px; border-radius:8px; margin-bottom:16px; display:none; font-weight:600; }
    .alert-error { background:#fef2f2; color:#991b1b; }
    .alert-success { background:#ecfdf5; color:#065f46; }
    .error-404 h2 { font-size:3rem; }
    .error-404 p { color:var(--text-secondary); margin:12px 0; }

    /* 统一返回按钮样式 */
    .btn-back { background:none; border:none; font-size:18px; font-weight:500; color:#2a6df4; cursor:pointer; padding:6px 12px 6px 4px; border-radius:40px; display:inline-flex; align-items:center; gap:6px; transition:background 0.2s; text-decoration:none; }
    .btn-back:hover { background:rgba(42,109,244,0.08); }
    .back-row { margin-top:20px; }

    @media (max-width: 480px) {
      .container { padding:24px 18px; }
      .btn-back { font-size:16px; }
    }
  </style>
</head>
<body>
  <div class="container" id="formContainer">
    <h2>🛡️ 创建 System 管理员</h2>
    <div class="alert" id="alertBox"></div>
    <form id="createForm">
      <div class="form-group"><label>用户名</label><input type="text" id="username" required placeholder="至少4位字符"></div>
      <div class="form-group"><label>密码</label><input type="password" id="password" required placeholder="至少8位字符"></div>
      <div class="form-group"><label>确认密码</label><input type="password" id="confirmPassword" required placeholder="请再次输入密码"></div>
      <button type="submit" class="btn">创建账户</button>
    </form>
    <div class="back-row">
      <a href="/" class="btn-back">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M15 6l-6 6 6 6"/></svg>返回首页
      </a>
    </div>
  </div>

  <script>
    (async () => {
      try {
        const res = await fetch('/api/admin/check-system');
        const data = await res.json();
        if (data.exists) {
          document.getElementById('formContainer').innerHTML = `
            <h2>404</h2>
            <p>Pages Not Found</p>
            <p>System 账户已存在，页面不可用</p>
            <p id="countdown">3 秒后返回首页...</p>
            <div class="back-row">
              <a href="/" class="btn-back">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M15 6l-6 6 6 6"/></svg>返回首页
              </a>
            </div>
          `;
          let seconds = 3;
          const countdownEl = document.getElementById('countdown');
          const timer = setInterval(() => {
            seconds--;
            if (seconds <= 0) {
              clearInterval(timer);
              window.location.href = '/index.html';
            } else {
              countdownEl.textContent = `${seconds} 秒后返回首页...`;
            }
          }, 1000);
        }
      } catch(e) { /* 忽略 */ }
    })();

    document.getElementById('createForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alertBox = document.getElementById('alertBox');
      alertBox.style.display = 'none';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (username.length < 4) {
        alertBox.className = 'alert alert-error';
        alertBox.textContent = '用户名至少4个字符';
        alertBox.style.display = 'block';
        return;
      }
      if (password.length < 8) {
        alertBox.className = 'alert alert-error';
        alertBox.textContent = '密码长度不能少于8位';
        alertBox.style.display = 'block';
        return;
      }
      if (password !== confirmPassword) {
        alertBox.className = 'alert alert-error';
        alertBox.textContent = '两次密码输入不一致';
        alertBox.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/admin/init-system', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, confirmPassword })
        });
        const result = await res.json();
        if (!res.ok) {
          alertBox.className = 'alert alert-error';
          alertBox.textContent = result.error || '创建失败';
          alertBox.style.display = 'block';
          return;
        }
        alertBox.className = 'alert alert-success';
        alertBox.textContent = 'System 账户创建成功！即将跳转登录页...';
        alertBox.style.display = 'block';
        setTimeout(() => {
          window.location.href = '/login.html';
        }, 2000);
      } catch (err) {
        alertBox.className = 'alert alert-error';
        alertBox.textContent = '网络错误，请重试';
        alertBox.style.display = 'block';
      }
    });
  </script>
</body>
</html>
