<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>系统公告 - 学分申请系统</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Segoe UI', 'PingFang SC', sans-serif; background: #f0f4ff; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .container {
      max-width:500px;
      width:100%;
      background:rgba(255,255,255,0.9);
      backdrop-filter:blur(12px);
      border-radius:32px;
      padding:40px 30px;
      text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,0.1);
      border:1px solid rgba(255,255,255,0.4);
      opacity:0;
      transform:scale(0.95) translateY(20px);
      animation:fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn {
      to { opacity:1; transform:scale(1) translateY(0); }
    }
    .icon { font-size:60px; margin-bottom:20px; }
    h1 { font-size:24px; color:#0b1e3a; margin-bottom:12px; }
    p { font-size:16px; color:#4a5568; line-height:1.6; margin-bottom:24px; }
    .btn { padding:10px 30px; border-radius:40px; font-weight:600; text-decoration:none; border:none; cursor:pointer; background:#2a6df4; color:#fff; font-size:16px; transition:0.2s; }
    .btn:hover { background:#1a4db5; }
    @media (max-width: 480px) {
      .container { padding:24px 18px; }
      h1 { font-size:20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📢</div>
    <h1>系统公告</h1>
    <p id="messageText">当前学分活动申请已暂停，请稍后再访问。</p>
    <button class="btn" onclick="goHome()">返回首页</button>
  </div>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const msg = urlParams.get('msg');
    if (msg) {
      document.getElementById('messageText').textContent = decodeURIComponent(msg);
    }
    function goHome() {
      const container = document.querySelector('.container');
      container.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
      container.style.opacity = '0';
      container.style.transform = 'scale(0.95)';
      setTimeout(() => {
        window.location.replace('/');
      }, 300);
    }
  </script>
</body>
</html>
